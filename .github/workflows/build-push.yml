name: Build and Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - agent_mode: openrouter
            tag: latest
          - agent_mode: hermes
            tag: hermes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (${{ matrix.agent_mode }})
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.tag }}
          build-args: AGENT_MODE=${{ matrix.agent_mode }}
          cache-from: type=gha,scope=${{ matrix.agent_mode }}
          cache-to: type=gha,mode=max,scope=${{ matrix.agent_mode }}
