# Running on Proxmox LXC (Linux) — network_mode: host is required for WebRTC.
# Docker bridge networking breaks ICE candidate resolution for UDP media streams.
# With host mode, all services bind directly to the LXC's network interface.

services:
  livekit-server:
    image: livekit/livekit-server:latest
    network_mode: host
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    restart: unless-stopped

  voice-agent:
    build:
      context: ./agent
    network_mode: host
    environment:
      # LiveKit connection
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}

      # --- LiveKit AgentSession ---
      # LIVEKIT_LLM: gemini-live | openai-realtime | gemini-2.5-flash | gpt-4o-mini
      # LIVEKIT_VOICE: Puck | Charon | Kore | Fenrir | Aoede (Gemini) | alloy | echo (OpenAI)
      - LIVEKIT_LLM=gemini-live
      - LIVEKIT_VOICE=Aoede
      # GOOGLE_API_KEY is loaded from ~/.hermes/.env via load_dotenv

      # --- Home Assistant via MCP ---
      # HA add-on: http://<ha-ip>:9583/private_<secret>
      # HA built-in: http://<ha-ip>:8123/api/mcp (needs HA_MCP_TOKEN)
      # HA_MCP_TOKEN is loaded from ~/.hermes/.env at runtime (HASS_TOKEN)
      - HA_MCP_URL=http://192.168.211.3:8123/api/mcp

      # --- Multi-tablet session manager ---
      - TOKEN_SERVER_URL=http://localhost:8090
      - DEVICE_POLL_INTERVAL=15
      - INTERCOM_API_KEY=${INTERCOM_API_KEY}
    volumes:
      # API keys loaded at runtime via load_dotenv
      - /root/.hermes:/root/.hermes
    depends_on:
      - livekit-server
    restart: unless-stopped

  token-server:
    build: ./token-server
    network_mode: host
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_EXTERNAL_URL=ws://${CT200_HOST}:7880
      - PORT=8090
      - AVATAR_DIR=/app/avatar
      # TTS backend (mirrors voice-agent setting so TalkingHead uses the same voice)
      - TTS_BACKEND=openai
      - TTS_VOICE=nova
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - INTERCOM_API_KEY=${INTERCOM_API_KEY}
    depends_on:
      - livekit-server
    restart: unless-stopped

  admin-dashboard:
    build: ./admin-dashboard
    network_mode: host
    environment:
      - LXC_HOST=127.0.0.1
      - LXC_USER=root
      - LXC_SSH_KEY=/ssh/admin_dashboard
      - COMPOSE_DIR=/opt/livekit-voice-agent
      - NEXT_PUBLIC_TOKEN_SERVER_URL=http://localhost:8090
      - HOSTNAME=0.0.0.0
      - PORT=3000
    volumes:
      - /root/.ssh/admin_dashboard:/ssh/admin_dashboard:ro
    depends_on:
      - token-server
    restart: unless-stopped
