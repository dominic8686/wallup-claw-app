blueprint:
  name: "Motion → Announce on Tablet"
  description: >
    When a motion sensor triggers, broadcast a TTS announcement to a specific
    tablet or all tablets.
  domain: automation
  input:
    motion_entity:
      name: Motion Sensor
      description: The binary sensor that detects motion.
      selector:
        entity:
          domain: binary_sensor
    message:
      name: Announcement Message
      description: "The text to announce via TTS."
      default: "Someone is at the front door."
      selector:
        text:
    target_devices:
      name: Target Tablets
      description: "Comma-separated device IDs (e.g., 'kitchen,living_room') or 'all'."
      default: "all"
      selector:
        text:
    cooldown:
      name: Cooldown (seconds)
      description: "Minimum time between announcements to avoid spam."
      default: 60
      selector:
        number:
          min: 10
          max: 600
          unit_of_measurement: seconds

trigger:
  - platform: state
    entity_id: !input motion_entity
    to: "on"

condition:
  - condition: template
    value_template: >
      {{ (as_timestamp(now()) - as_timestamp(state_attr('automation.' ~ this.attributes.friendly_name | slugify, 'last_triggered') or 0)) > {{ cooldown }} }}

action:
  - service: hermes_intercom.broadcast
    data:
      message: !input message
      targets: !input target_devices
